

notifications:
  email:
    recipients:
      - humberto.a.sanchez.ii@gmail.com
    on_success: change # default: change
    on_failure: always # default: always

language: python

dist: noble

cache: pip

services:
  - xvfb

python:
  - "3.13"

install:
  - echo '***************************************************************'
  - sudo apt update
  - sudo apt install libnotify-dev
  - sudo apt install libgtk-3-dev
  - sudo apt install libtiff-dev
  - sudo apt-get install -y  libsdl2-dev
  - echo '***************************************************************'
  - GLOBAL=`python --version`
  - echo $GLOBAL
  - PY_VERSION=${GLOBAL#* }
  - pyenv global ${PY_VERSION}
  - pip install pip==26.0.1
  - pip install wheel==0.44.0
  - pip install setuptools==70.1.1
  - pip install six==1.17.0
  - pip install attrdict3==2.0.2
  - pip install -v -f https://extras.wxpython.org/wxPython4/extras/linux/gtk3/ubuntu-24.04  wxPython==4.2.4 -c constraints.txt
  - pip install html-testRunner~=1.2.1
  - pip install codeallybasic==1.30.0
  - pip install umlmodel==3.4.0
  - pip install untangle==1.2.1
  - pip install codeallyadvanced==2.3.0
  - pip install umlshapes==1.9.0
# command to run tests
script:
  - pip install buildlackey
  - unittests -v loud
